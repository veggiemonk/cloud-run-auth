apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: runiap
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "3"
    spec:
      containerConcurrency: 80
      containers:
        - image: IMAGE_PLACEHOLDER
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: "1"
              memory: 256Mi
          env:
            - name: IAP_AUDIENCE
              value: "" # REQUIRED: set to /projects/PROJECT_NUMBER/locations/REGION/services/SERVICE_NAME
